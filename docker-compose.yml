services:
  postgres:
    image: postgres:16-alpine
    container_name: collectorfigu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-collectorfigu}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: deps
    container_name: collectorfigu-api
    restart: unless-stopped
    # El seed de datos demo ya NO se corre automaticamente: el catalogo real se carga por
    # importacion masiva desde el panel admin. Para re-sembrar datos demo manualmente:
    # docker compose exec api npm run seed
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run start:dev"
    env_file: .env
    environment:
      NODE_ENV: development
    ports:
      - "4001:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: deps
    container_name: collectorfigu-web
    restart: unless-stopped
    command: npm run dev
    env_file: .env
    environment:
      NODE_ENV: development
      NEXT_SERVER_API_URL: http://api:4000/api/v1
    ports:
      - "2026:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
